# Local quality gate — fast checks before code leaves your machine.
# The full suite (gosec, govulncheck, docker image scans) runs in CI.
# Emergency bypass: git commit --no-verify  /  git push --no-verify

pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: |
        unformatted=$(gofmt -l {staged_files})
        [ -z "$unformatted" ] || { echo "gofmt needed:"; echo "$unformatted"; exit 1; }
    gitleaks:
      run: gitleaks git --staged --redact

pre-push:
  parallel: true
  commands:
    vet:
      run: go vet ./...
    lint:
      run: golangci-lint run
    test:
      run: go test -race ./...

# Refresh the code side of the knowledge graph after commits that touch Go files.
# AST-only (no LLM, free); doc/markdown changes still need a manual `/graphify` rebuild.
# Skips entirely when graphify isn't set up (no graph.json) — safe for fresh clones.
post-commit:
  commands:
    graphify-update:
      run: |
        [ -f graphify-out/graph.json ] || exit 0
        git diff-tree --no-commit-id --name-only -r HEAD | grep -q '\.go$' || exit 0
        graphify update . >/dev/null 2>&1 || true
